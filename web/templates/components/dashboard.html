            <!-- Dashboard View -->
            <section id="dashboard" class="content-view dashboard-view active">

                <!-- ── Header Row ───────────────────────────────── -->
                <div class="dash-layout-block" id="dash-layout-header">
                    <div class="dash-header">
                        <div class="dash-header-left">
                            <div class="dash-logo-wrap">
                                <span class="dash-logo-icon">◇</span>
                            </div>
                            <div>
                                <h1 class="dash-app-name">LifeOS</h1>
                                <p class="dash-tagline" id="dashboard-greeting">مرحباً</p>
                            </div>
                        </div>
                        <div class="dash-header-stats">
                            <div class="dash-stat-pill">
                                <span class="dash-stat-val" id="dash-stat-done">0</span>
                                <span class="dash-stat-lbl">مكتملة</span>
                            </div>
                            <div class="dash-stat-sep"></div>
                            <div class="dash-stat-pill">
                                <span class="dash-stat-val" id="dash-stat-pending">0</span>
                                <span class="dash-stat-lbl">متبقية</span>
                            </div>
                            <div class="dash-stat-sep"></div>
                            <div class="dash-stat-pill">
                                <span class="dash-stat-val dash-stat-pct" id="dash-stat-pct">0%</span>
                                <span class="dash-stat-lbl">الإنجاز</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── Progress Bar ──────────────────────────────── -->
                <div class="dash-layout-block" id="dash-layout-progress">
                    <div class="dash-progress-row">
                        <div class="dash-progress-track">
                            <div class="dash-progress-fill" id="dash-progress-fill" style="width:0%"></div>
                        </div>
                        <span class="dash-progress-label" id="dash-date-label"></span>
                    </div>
                </div>

                <!-- ── Projects Grid ────────────────────────────── -->
                <div class="dash-layout-block" id="dash-layout-projects">
                    <div class="dash-section-label">المشاريع</div>
                    <div class="dash-axes-grid" id="dash-axes-grid">
                        <!-- Populated by dashboard.js -->
                        <div class="dash-axis-skeleton"></div>
                        <div class="dash-axis-skeleton"></div>
                        <div class="dash-axis-skeleton"></div>
                        <div class="dash-axis-skeleton"></div>
                        <div class="dash-axis-skeleton"></div>
                        <div class="dash-axis-skeleton"></div>
                    </div>
                </div>

                <!-- ── Bottom Row: Tasks + Quick Note ───────────── -->
                <div class="dash-layout-block" id="dash-layout-widgets">
                    <div class="dash-bottom-grid" id="dash-bottom-grid">

                        <!-- Today's Focus Tasks -->
                        <div class="dash-widget dash-tasks-widget" id="widget-tasks">
                            <div class="dash-widget-header">
                                <span class="dash-widget-title">تركيز اليوم</span>
                                <button class="dash-widget-action"
                                        onclick="window.loadView?.('tasks')"
                                        title="عرض كل المهام">←</button>
                            </div>
                            <div class="dash-tasks-list" id="dashboard-tasks-list">
                                <p class="dash-empty">جاري التحميل...</p>
                            </div>
                        </div>

                        <!-- Quick Brain Dump -->
                        <div class="dash-widget dash-note-widget" id="widget-note">
                            <div class="dash-widget-header">
                                <span class="dash-widget-title">تفريغ سريع</span>
                                <button class="dash-widget-action dash-note-save" id="save-quick-note" title="حفظ">✓</button>
                            </div>
                            <textarea
                                id="quick-note-area"
                                class="dash-note-textarea"
                                placeholder="اكتب أي فكرة الآن... ستُحفظ تلقائياً"
                                rows="5"></textarea>
                            <p class="dash-note-saved" id="dash-note-saved">تم الحفظ ✓</p>
                        </div>

                    </div>
                </div>

                <!-- ── Quick Actions ─────────────────────────────── -->
                <div class="dash-layout-block" id="dash-layout-actions">
                    <div class="dash-quick-actions" id="dash-quick-actions">
                        <button class="dash-action-btn" onclick="window.loadView?.('tasks')" id="dash-go-tasks">
                            <span>✓</span> المهام
                        </button>
                        <button class="dash-action-btn" onclick="window.loadView?.('writing')" id="dash-go-writing">
                            <span>✎</span> الكتابة
                        </button>
                        <button class="dash-action-btn" onclick="window.loadView?.('ai-chat')" id="dash-go-ai">
                            <span>✦</span> AI
                        </button>
                        <button class="dash-action-btn" onclick="window.loadView?.('templates')" id="dash-go-templates">
                            <span>⊞</span> القوالب
                        </button>
                    </div>
                </div>

            </section>
