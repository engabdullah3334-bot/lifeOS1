# ══════════════════════════════════════════════════════════════════════════════
#  LifeOS — Application Configuration
#  ────────────────────────────────────────────────────────────────────────────
#  All application settings, defaults, and constants in one place.
#  Modify values here instead of editing Python files.
# ══════════════════════════════════════════════════════════════════════════════

app:
  name: "LifeOS"
  version: "2.0.0"

modules:
  tasks:
    enabled: true
    title: "Tasks"
    icon: "✓"

  writing:
    enabled: true
    title: "Writing Space"
    icon: "✎"

  archive:
    enabled: true
    title: "Archive"
    icon: "📦"

  templates:
    enabled: true
    title: "Templates"
    icon: "📚"

  ai:
    enabled: true
    title: "Assistant"
    icon: "✦"

ui:
  dashboard_layout:
    - "tasks_widget"
    - "stats_widget"
    - "quick_note_widget"
  default_view: "dashboard"
  show_welcome: true

# Default values for user settings (used when no user settings exist in DB)
settings_defaults:
  theme: "dark"
  taskSortBy: "order"
  taskCurrentView: "projects"
  taskCalMode: "month"
  primaryColor: "#4d7cff"
  backgroundType: "gradient"
  backgroundColor: "#0b0f1a"
  backgroundImage: null
  showStatsBar: true
  soundEnabled: true
  uiOpacity: 1

# Application-wide constants
constants:
  system_project_id: "system"
  default_project_id: "general"
  default_project_color: "#6366f1"
  default_project_icon: "📁"

# AI configuration
ai:
  provider_env_key: "AI_PROVIDER"
  default_provider: "gemini"
  default_mode: "planning"
  action_tag_pattern: '\\[ACTION:([A-Z_]+)\\](.*?)\\[/ACTION\\]'

# ── Life Axes — Core pillars that structure the user's day
# These are semi-permanent and define how tasks/time are categorized.
# To add a new axis: add an entry below and create matching tasks with the axis_tag.
life_axes:
  - id: "university"
    label: "الجامعة"
    icon: "🎓"
    color: "#4d7cff"
    min_hours: 5
    max_hours: 9
    priority: 1

  - id: "work"
    label: "العمل"
    icon: "💼"
    color: "#10b981"
    min_hours: 1
    max_hours: 3
    priority: 2

  - id: "sports"
    label: "الرياضة"
    icon: "💪"
    color: "#f97316"
    min_hours: 1
    max_hours: 2
    priority: 3

  - id: "goal"
    label: "الهدف"
    icon: "🎯"
    color: "#9b4dff"
    min_hours: 0
    max_hours: 1
    priority: 4

  - id: "learning"
    label: "التعلم والكتابة"
    icon: "📚"
    color: "#27f5ff"
    min_hours: 1
    max_hours: 2
    priority: 5

  - id: "entertainment"
    label: "الترفيه"
    icon: "🎮"
    color: "#eab308"
    min_hours: 0
    max_hours: 2.5
    priority: 6
